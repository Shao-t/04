<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #fcfaf8;
            --text-color: #4a4a4a;
            --accent-color: #d4a373;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Optima', 'Baskerville', serif; 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden; /* 防止飛機飛出時產生橫向捲軸 */
        }

        /* --- 背景特效區 --- */
        .plane-container {
            position: fixed;
            top: 12%;
            left: -150px;
            z-index: -1;
            pointer-events: none;
            opacity: 0.6;
        }
        .plane {
            width: 100px;
            height: auto;
            animation: flyAcross 18s linear infinite;
        }
        @keyframes flyAcross {
            0% { transform: translate(0, 0) rotate(15deg); left: -150px; }
            100% { transform: translate(120vw, -50px) rotate(15deg); left: 100%; }
        }

        .floating-icon {
            position: fixed;
            z-index: -2;
            pointer-events: none;
            opacity: 0.4;
            width: 50px; /* 固定寬度，比例自動 */
            height: auto;
            animation: slowFloat 8s ease-in-out infinite;
        }
        @keyframes slowFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(8deg); }
        }
        .icon-p4 { top: 15%; left: 8%; animation-delay: 0s; }
        .icon-p5 { top: 20%; right: 10%; animation-delay: 2s; }
        .icon-p6 { bottom: 15%; left: 12%; animation-delay: 4s; }
        .icon-p7 { bottom: 25%; right: 5%; animation-delay: 6s; }

        /* --- 闖關卡片 UI --- */
        .card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            padding: 30px 20px; 
            margin: 10px; 
            max-width: 400px; 
            width: 90%; 
            text-align: center; 
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        input { 
            border: 2px solid #eee; 
            border-radius: 12px; 
            padding: 12px; 
            font-size: 18px; 
            width: 80%; 
            margin-top: 15px; 
            outline: none; 
            text-align: center;
        }
        input:focus { border-color: var(--accent-color); }
        .hidden { display: none; }

        /* --- 照片集佈局 --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-gap: 25px;
            max-width: 1200px;
            margin: 30px auto;
            width: 100%;
        }
        .photo-card {
            background: white;
            padding: 12px;
            border-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.5s;
            opacity: 0;
            transform: translateY(30px);
        }
        .photo-card.show { opacity: 1; transform: translateY(0); }
        .photo-card img { width: 100%; height: auto; border-radius: 2px; }
        .caption { padding: 15px 5px; font-size: 0.9rem; text-align: center; color: var(--accent-color); font-style: italic; }

        #showP1 {
            background: var(--accent-color); color: white; border: none;
            padding: 15px 40px; border-radius: 50px; font-size: 1.1rem;
            cursor: pointer; box-shadow: 0 5px 15px rgba(212, 163, 115, 0.4);
        }
    </style>
</head>
<body>

    <div class="plane-container"><img src="images/p3.png" class="plane"></div>
    <img src="images/p4.png" class="floating-icon icon-p4">
    <img src="images/p5.png" class="floating-icon icon-p5">
    <img src="images/p6.png" class="floating-icon icon-p6">
    <img src="images/p7.png" class="floating-icon icon-p7">

    <div id="level1" class="card">
        <h2>🔒 System Locked</h2>
        <p>關卡1：兔子的生日 (MMDD)</p>
        <input type="tel" id="input1" maxlength="4" autofocus>
    </div>
    <div id="level2" class="card hidden">
        <p>💡 關卡 2：第一個國家?</p>
        (a) 日本 (b) 美國 (c) 法國 (d) 泰國
        <input type="text" id="input2" maxlength="1">
    </div>
    <div id="level3" class="card hidden">
        <p>🍴 關卡 3：最喜歡吃的食物?</p>
        (a) 漢堡 (b) 義大利麵 (c) 烤肉飯 (d) 火鍋
        <input type="text" id="input3" maxlength="1">
    </div>
    <div id="level4" class="card hidden">
        <p>🔢 關卡 4：67*4+252=?</p>
        <input type="tel" id="input4" maxlength="3">
    </div>
    <div id="level5" class="card hidden">
        <p>✨ 最終關卡：打開嗎？</p>
        <input type="text" id="input5" placeholder="yes" maxlength="3">
    </div>

    <div id="success" class="hidden" style="width: 100%;">
        <header style="text-align:center;">
            <h1 style="letter-spacing: 5px;">MEMORIES</h1>
            <p>Every moment counts.</p>
        </header>

        <div class="gallery" id="gallery">
            <div class="photo-card"><img src="images/p1.jpg"><div class="caption">那天的陽光很暖</div></div>
            <div class="photo-card"><img src="images/p2.jpg"><div class="caption">初次見面的驚喜</div></div>
            <div class="photo-card"><img src="images/p3.jpg"><div class="caption">未來的每一天都有妳</div></div>
            </div>

        <center>
            <button id="showP1">打開最後的驚喜</button>
            <div id="pageP1" class="card hidden" style="margin-top: 30px; max-width: 600px;">
                <img src="images/p_final.png" style="width: 100%; border-radius: 12px;">
                <p>這是專屬於你的話：你的笑容，是我最珍貴的記憶。</p>
            </div>
        </center>
    </div>

<script>
    const answers = { 1: '0424', 2: 'A', 3: 'D', 4: '520', 5: 'yes' };

    function checkAnswer(level) {
        const input = document.getElementById(`input${level}`);
        if (input.value.toLowerCase() === answers[level].toLowerCase()) {
            confetti({ particleCount: 30, spread: 60, origin: { y: 0.7 } });
            document.getElementById(`level${level}`).classList.add('hidden');
            if (level < 5) {
                const next = document.getElementById(`level${level + 1}`);
                next.classList.remove('hidden');
                next.querySelector('input').focus();
            } else {
                showSuccess();
            }
        }
    }

    function showSuccess() {
        document.getElementById('success').classList.remove('hidden');
        // 全螢幕大噴砂
        var end = Date.now() + 4000;
        (function frame() {
            confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ffcad4', '#d4a373'] });
            confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ffcad4', '#d4a373'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
        
        const cards = document.querySelectorAll('.photo-card');
        cards.forEach((card, i) => setTimeout(() => card.classList.add('show'), i * 300));
    }

    for (let i = 1; i <= 5; i++) {
        document.getElementById(`input${i}`).addEventListener('input', () => {
            if(document.getElementById(`input${i}`).value.length >= answers[i].length) checkAnswer(i);
        });
    }

    document.getElementById('showP1').addEventListener('click', () => {
        document.getElementById('pageP1').classList.remove('hidden');
        document.getElementById('showP1').style.display = 'none';
    });
</script>
</body>
</html>
